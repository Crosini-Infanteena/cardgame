<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --card-back: #252340;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: #3d3a6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(77, 150, 255, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255, 107, 107, 0.08) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 22px);
    color: var(--accent2);
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 3px 3px 0px rgba(255, 107, 107, 0.5);
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    text-align: center;
  }

  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
    min-width: 100px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Press Start 2P', monospace;
    display: block;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent2);
  }

  .stat-value.moves { color: var(--accent4); }
  .stat-value.time  { color: var(--accent3); }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 440px;
    width: 100%;
    margin-bottom: 20px;
  }

  .card {
    aspect-ratio: 1;
    cursor: pointer;
    perspective: 800px;
    border-radius: 14px;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-radius: 14px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back {
    background: var(--card-back);
    border: 2px solid var(--border);
    font-size: 22px;
    color: var(--border);
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    transition: border-color 0.2s, background 0.2s;
  }

  .card:hover:not(.flipped):not(.matched) .card-back {
    border-color: var(--accent4);
    background: #2a2750;
  }

  .card-front {
    background: var(--surface);
    border: 2px solid var(--border);
    transform: rotateY(180deg);
    font-size: clamp(26px, 6vw, 36px);
    flex-direction: column;
    gap: 4px;
  }

  .card.matched .card-front {
    border-color: var(--accent3);
    background: rgba(107, 203, 119, 0.1);
    animation: matchPop 0.4s ease;
  }

  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card.wrong .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25%      { transform: rotateY(180deg) translateX(-6px); }
    75%      { transform: rotateY(180deg) translateX(6px); }
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 0 #b84a4a;
  }

  .btn-primary:hover { box-shadow: 0 6px 0 #b84a4a; transform: translateY(-2px); }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 9, 20, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    padding: 24px;
  }

  .overlay.show { display: flex; }

  .overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 4vw, 28px);
    color: var(--accent2);
    text-shadow: 3px 3px 0 var(--accent);
    line-height: 1.6;
  }

  .overlay p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .overlay .big { font-size: 52px; }

  .stars { font-size: 32px; letter-spacing: 4px; }

  .progress-bar {
    width: 100%;
    max-width: 440px;
    height: 6px;
    background: var(--surface);
    border-radius: 99px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent4), var(--accent3));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    width: 100%;
    max-width: 440px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<h1>MEMORY GAME</h1>
<p class="subtitle">Cards match பண்ணி score பண்ணுங்க!</p>

<div class="stats">
  <div class="stat-box">
    <span class="stat-label">SCORE</span>
    <span class="stat-value" id="score">0</span>
  </div>
  <div class="stat-box">
    <span class="stat-label">MOVES</span>
    <span class="stat-value moves" id="moves">0</span>
  </div>
  <div class="stat-box">
    <span class="stat-label">TIME</span>
    <span class="stat-value time" id="timer">0s</span>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="progress-label" id="progress-label">0 / 8 pairs matched</div>

<div class="board" id="board"></div>

<button class="btn btn-primary" onclick="initGame()">NEW GAME</button>

<div class="overlay" id="overlay">
  <div class="big" id="overlay-emoji">🎉</div>
  <h2 id="overlay-title">YOU WIN!</h2>
  <div class="stars" id="overlay-stars">⭐⭐⭐</div>
  <p id="overlay-msg">Great job!</p>
  <button class="btn btn-primary" onclick="closeOverlay()">PLAY AGAIN</button>
</div>

<script>
  const EMOJIS = ['🍕','🎸','🚀','🦊','🌈','🎮','🍦','🐉','⚡','🎯','🦄','💎','🌺','🎲','🐬','🍩'];
  const PAIRS = 8;

  let cards = [], flipped = [], matched = 0, moves = 0, score = 0;
  let canFlip = true, timerInterval = null, seconds = 0;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    clearInterval(timerInterval);
    seconds = 0; moves = 0; score = 0; matched = 0;
    flipped = []; canFlip = true;
    updateStats();
    updateProgress();
    document.getElementById('timer').textContent = '0s';

    const chosen = shuffle([...EMOJIS]).slice(0, PAIRS);
    cards = shuffle([...chosen, ...chosen].map((emoji, i) => ({ emoji, id: i })));

    const board = document.getElementById('board');
    board.innerHTML = '';
    cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.index = i;
      el.innerHTML = `<div class="card-inner">
        <div class="card-back">?</div>
        <div class="card-front">${card.emoji}</div>
      </div>`;
      el.addEventListener('click', () => flipCard(el, i));
      board.appendChild(el);
    });

    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds + 's';
    }, 1000);
  }

  function flipCard(el, index) {
    if (!canFlip || el.classList.contains('flipped') || el.classList.contains('matched')) return;
    if (flipped.length === 0) el.classList.add('flipped'), flipped.push({ el, index });
    else if (flipped.length === 1 && flipped[0].index !== index) {
      el.classList.add('flipped');
      flipped.push({ el, index });
      moves++;
      updateStats();
      canFlip = false;
      setTimeout(checkMatch, 900);
    }
  }

  function checkMatch() {
    const [a, b] = flipped;
    if (cards[a.index].emoji === cards[b.index].emoji) {
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matched++;
      score += Math.max(10, 50 - moves * 2);
      updateStats();
      updateProgress();
      if (matched === PAIRS) setTimeout(showWin, 500);
    } else {
      a.el.classList.add('wrong');
      b.el.classList.add('wrong');
      setTimeout(() => {
        a.el.classList.remove('flipped', 'wrong');
        b.el.classList.remove('flipped', 'wrong');
      }, 500);
    }
    flipped = [];
    canFlip = true;
  }

  function updateStats() {
    document.getElementById('score').textContent = score;
    document.getElementById('moves').textContent = moves;
  }

  function updateProgress() {
    const pct = (matched / PAIRS) * 100;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('progress-label').textContent = matched + ' / ' + PAIRS + ' pairs matched';
  }

  function showWin() {
    clearInterval(timerInterval);
    const stars = moves <= 12 ? '⭐⭐⭐' : moves <= 18 ? '⭐⭐' : '⭐';
    const msgs = {
      '⭐⭐⭐': 'Perfect! ' + seconds + 's-ல் ' + moves + ' moves மட்டும்! Master-level!',
      '⭐⭐': 'Well done! ' + seconds + 's — இன்னும் கொஞ்சம் practice பண்ணு!',
      '⭐': 'Completed! ' + seconds + 's — Next time faster try பண்ணு!'
    };
    document.getElementById('overlay-stars').textContent = stars;
    document.getElementById('overlay-msg').textContent = msgs[stars];
    document.getElementById('overlay-title').textContent = 'YOU WIN!';
    document.getElementById('overlay-emoji').textContent = '🎉';
    document.getElementById('overlay').classList.add('show');
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    initGame();
  }

  initGame();
</script>
</body>
</html>
